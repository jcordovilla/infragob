<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 22px sans-serif; fill: #1a1a1a; }
      .section-title { font: bold 18px sans-serif; fill: #2c5282; }
      .role-title { font: bold 14px sans-serif; fill: #1a202c; }
      .role-text { font: 12px sans-serif; fill: #4a5568; }
      .traditional-box { fill: #fee; stroke: #c53030; stroke-width: 2; }
      .digital-box { fill: #e6ffe6; stroke: #2f855a; stroke-width: 2; }
      .actor-public { fill: #dbeafe; stroke: #1e40af; stroke-width: 2; }
      .actor-private { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .relationship-adversarial { fill: none; stroke: #c53030; stroke-width: 3; stroke-dasharray: 8,4; }
      .relationship-collaborative { fill: none; stroke: #2f855a; stroke-width: 3; }
      .label-adversarial { font: italic bold 13px sans-serif; fill: #c53030; }
      .label-collaborative { font: italic bold 13px sans-serif; fill: #2f855a; }
      .benefit-text { font: 12px sans-serif; fill: #2d3748; }
      .arrow { fill: #2c5282; }
    </style>
  </defs>

  <!-- Traditional Model Section -->
  <text x="225" y="70" class="section-title" text-anchor="middle">Traditional PPP Model</text>

  <!-- Public Authority - Traditional -->
  <rect x="50" y="90" width="160" height="110" class="actor-public" rx="6"/>
  <text x="130" y="110" class="role-title" text-anchor="middle">Public Authority</text>
  <text x="60" y="130" class="role-text">Role:</text>
  <text x="60" y="148" class="role-text">• Contract enforcer</text>
  <text x="60" y="164" class="role-text">• Compliance monitor</text>
  <text x="60" y="180" class="role-text">• Penalty applier</text>
  <text x="60" y="196" class="role-text">• Risk allocator</text>

  <!-- Private Operator - Traditional -->
  <rect x="240" y="90" width="160" height="110" class="actor-private" rx="6"/>
  <text x="320" y="110" class="role-title" text-anchor="middle">Private Operator</text>
  <text x="250" y="130" class="role-text">Role:</text>
  <text x="250" y="148" class="role-text">• Profit maximizer</text>
  <text x="250" y="164" class="role-text">• Minimum standard</text>
  <text x="250" y="180" class="role-text">• Cost minimizer</text>
  <text x="250" y="196" class="role-text">• Risk avoider</text>

  <!-- Adversarial Relationship -->
  <path d="M 130 210 L 130 245 L 320 245 L 320 210" class="relationship-adversarial"/>
  <text x="225" y="240" class="label-adversarial" text-anchor="middle">Adversarial Relationship</text>

  <!-- Traditional Characteristics -->
  <rect x="50" y="260" width="350" height="140" class="traditional-box" rx="6"/>
  <text x="225" y="282" class="role-title" text-anchor="middle">Characteristics</text>
  <text x="60" y="305" class="role-text">Information Asymmetry: different data, limited sharing</text>
  <text x="60" y="328" class="role-text">Decision Making: Isolated, based on incomplete information</text>
  <text x="60" y="351" class="role-text">Problem Resolution: Reactive, blame game, contract disputes</text>
  <text x="60" y="374" class="role-text">Performance Focus: Compliance with minimum standards</text>
  <text x="60" y="395" class="role-text">Outcome: Zero-sum mentality, adversarial dynamics</text>

  <!-- Digital Twin Model Section -->
  <text x="675" y="70" class="section-title" text-anchor="middle">Digital Twin-Enabled Model</text>

  <!-- Public Authority - Digital -->
  <rect x="500" y="90" width="160" height="110" class="actor-public" rx="6"/>
  <text x="580" y="110" class="role-title" text-anchor="middle">Public Authority</text>
  <text x="510" y="130" class="role-text">Role:</text>
  <text x="510" y="148" class="role-text">• Performance partner</text>
  <text x="510" y="164" class="role-text">• Value co-creator</text>
  <text x="510" y="180" class="role-text">• Innovation enabler</text>
  <text x="510" y="196" class="role-text">• Public interest guardian</text>

  <!-- Private Operator - Digital -->
  <rect x="690" y="90" width="160" height="110" class="actor-private" rx="6"/>
  <text x="770" y="110" class="role-title" text-anchor="middle">Private Operator</text>
  <text x="700" y="130" class="role-text">Role:</text>
  <text x="700" y="148" class="role-text">• Value optimizer</text>
  <text x="700" y="164" class="role-text">• Innovation driver</text>
  <text x="700" y="180" class="role-text">• Lifecycle manager</text>
  <text x="700" y="196" class="role-text">• Performance maximizer</text>

  <!-- Collaborative Relationship -->
  <path d="M 580 210 L 580 245 L 770 245 L 770 210" class="relationship-collaborative"/>
  <text x="675" y="240" class="label-collaborative" text-anchor="middle">Collaborative Partnership</text>

  <!-- Digital Characteristics -->
  <rect x="500" y="260" width="350" height="140" class="digital-box" rx="6"/>
  <text x="675" y="282" class="role-title" text-anchor="middle">Characteristics</text>
  <text x="510" y="305" class="role-text">Shared Information: Real-time data accessible to both parties</text>
  <text x="510" y="328" class="role-text">Decision Making: Collaborative, evidence-based, predictive</text>
  <text x="510" y="351" class="role-text">Problem Resolution: Proactive, joint solutions, early intervention</text>
  <text x="510" y="374" class="role-text">Performance Focus: Continuous improvement, lifecycle value</text>
  <text x="510" y="395" class="role-text">Outcome: Aligned interests, mutual value creation</text>

  <!-- Bottom: Key Enablers -->
  <text x="450" y="440" class="section-title" text-anchor="middle">Digital Twin Enablers of Transformation</text>

  <rect x="50" y="460" width="260" height="110" rx="6" fill="#f7fafc" stroke="#4a5568" stroke-width="1.5"/>
  <text x="180" y="480" class="role-title" text-anchor="middle">Shared Situational Awareness</text>
  <text x="60" y="500" class="benefit-text">• Both parties see same real-time data</text>
  <text x="60" y="518" class="benefit-text">• Transparent performance metrics</text>
  <text x="60" y="536" class="benefit-text">• Common understanding of risks</text>
  <text x="60" y="554" class="benefit-text">• Evidence-based discussions</text>

  <rect x="330" y="460" width="240" height="110" rx="6" fill="#f7fafc" stroke="#4a5568" stroke-width="1.5"/>
  <text x="450" y="480" class="role-title" text-anchor="middle">Predictive Collaboration</text>
  <text x="340" y="500" class="benefit-text">• Early problem identification</text>
  <text x="340" y="518" class="benefit-text">• Joint scenario modeling</text>
  <text x="340" y="536" class="benefit-text">• Proactive decision making</text>
  <text x="340" y="554" class="benefit-text">• Shared optimization goals</text>

  <rect x="590" y="460" width="260" height="110" rx="6" fill="#f7fafc" stroke="#4a5568" stroke-width="1.5"/>
  <text x="720" y="480" class="role-title" text-anchor="middle">Continuous Learning</text>
  <text x="600" y="500" class="benefit-text">• Performance feedback loops</text>
  <text x="600" y="518" class="benefit-text">• Data-driven improvements</text>
  <text x="600" y="536" class="benefit-text">• Adaptive risk management</text>
  <text x="600" y="554" class="benefit-text">• Institutional knowledge building</text>
</svg>