<svg viewBox="0 0 880 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Georgia, 'Playfair Display', serif; font-size: 21px; font-weight: 700; fill: #1e2640; }
      .subtitle { font-family: Georgia, 'Playfair Display', serif; font-size: 15px; font-weight: 400; fill: #1e2640; }
      .label-text { font-family: 'Inter', 'Source Sans Pro', system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #1e2640; }
      .body-text { font-family: 'Inter', 'Source Sans Pro', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #4a5568; }
      .accent-text { font-family: 'Inter', 'Source Sans Pro', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #00b764; }
      .pill { fill: #ffffff; }
    </style>
    <filter id="pill-shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="340" fill="#e8e6e3" rx="0"/>

  <!-- Title -->
  <text x="440" y="40" class="title" text-anchor="middle">Tres ejes de trabajo</text>

  <!-- Pillar 1: Interoperabilidad -->
  <g filter="url(#pill-shadow)">
    <rect x="25" y="70" width="270" height="130" rx="20" class="pill"/>
    <rect x="25" y="70" width="270" height="130" rx="20" fill="none" stroke="#00b764" stroke-width="1.5"/>
    <text x="160" y="98" class="accent-text" text-anchor="middle">Interoperabilidad</text>
    <text x="47" y="120" class="body-text">Hacer que la información</text>
    <text x="47" y="136" class="body-text">acumulada sea consultable.</text>
    <text x="47" y="156" class="body-text">Estructurar, normalizar y conectar</text>
    <text x="47" y="172" class="body-text">datos entre fuentes y formatos.</text>
    <text x="47" y="192" class="body-text" font-style="italic">Ingeniería de datos.</text>
  </g>

  <!-- Pillar 2: Casos de uso -->
  <g filter="url(#pill-shadow)">
    <rect x="305" y="70" width="270" height="130" rx="20" class="pill"/>
    <rect x="305" y="70" width="270" height="130" rx="20" fill="none" stroke="#00b764" stroke-width="1.5"/>
    <text x="440" y="98" class="accent-text" text-anchor="middle">Casos de uso</text>
    <text x="327" y="120" class="body-text">Inventariar qué datos existen,</text>
    <text x="327" y="136" class="body-text">en qué formato y con qué</text>
    <text x="327" y="152" class="body-text">consistencia, antes de decidir</text>
    <text x="327" y="168" class="body-text">qué automatizar.</text>
    <text x="327" y="192" class="body-text" font-style="italic">Descubrir antes de elegir.</text>
  </g>

  <!-- Pillar 3: Colaboración -->
  <g filter="url(#pill-shadow)">
    <rect x="585" y="70" width="270" height="130" rx="20" class="pill"/>
    <rect x="585" y="70" width="270" height="130" rx="20" fill="none" stroke="#00b764" stroke-width="1.5"/>
    <text x="720" y="98" class="accent-text" text-anchor="middle">Colaboración</text>
    <text x="607" y="120" class="body-text">Intercambio: conocimiento vertical</text>
    <text x="607" y="136" class="body-text">por infraestructura IA.</text>
    <text x="607" y="156" class="body-text">La ingeniería retiene</text>
    <text x="607" y="172" class="body-text">el conocimiento sectorial.</text>
    <text x="607" y="192" class="body-text" font-style="italic">Más allá de las licencias.</text>
  </g>

  <!-- Connecting base line -->
  <line x1="160" y1="215" x2="160" y2="240" stroke="#00b764" stroke-width="1.5"/>
  <line x1="440" y1="215" x2="440" y2="240" stroke="#00b764" stroke-width="1.5"/>
  <line x1="720" y1="215" x2="720" y2="240" stroke="#00b764" stroke-width="1.5"/>
  <line x1="160" y1="240" x2="720" y2="240" stroke="#00b764" stroke-width="1.5"/>
  <line x1="440" y1="240" x2="440" y2="260" stroke="#00b764" stroke-width="1.5"/>

  <!-- Bottom insight -->
  <g filter="url(#pill-shadow)">
    <rect x="195" y="262" width="490" height="36" rx="14" class="pill"/>
    <text x="440" y="285" class="subtitle" text-anchor="middle" font-style="italic">Convertir la información acumulada en un activo consultable</text>
  </g>

  <!-- Source -->
  <text x="440" y="327" class="body-text" text-anchor="middle" font-style="italic" fill="#8a8a8a">El futuro de las pymes de ingeniería y construcción</text>
</svg>
